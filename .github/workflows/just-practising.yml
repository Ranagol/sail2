name: How to do Laravel Sail CI/CD

env:
  DB_CONNECTION: mysql
# In app .env this is set to mysql, but in GitHub Actions we need to set it to
# this value because the MySQL service is running on localhost. On our local app
# it runs in a Docker container named mysql, so we can use mysql as the host.
# But in GitHub Actions, we need to connect to the MySQL service using localhost and the exposed port.
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: ${{ secrets.MYSQL_DATABASE }}
  DB_USERNAME: ${{ secrets.MYSQL_USER }}
  DB_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

# Here: every push to the "main" branch triggers the pipeline.
on:
  push:
    branches: [ main ]

jobs:

  # We run Larastan here, we check for errors in the code.
  larastan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      # This step finds Composer’s cache directory. Composer stores downloaded packages there to
      # avoid downloading them again.
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      # This step caches Composer downloads between CI runs.
      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}

          # If composer.lock changes → cache invalidates → dependencies reinstall.
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Larastan
      # Notice that we run Larastan on level 6.
        run: ./vendor/bin/phpstan analyse -l 6 --memory-limit=512M --no-progress

  test:
    runs-on: ubuntu-latest

    # This ensures tests only run if Larastan passes.
    needs: larastan

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306

# This is a health check for the MySQL service
# mysqladmin → MySQL admin CLI tool
# ping → Check if the MySQL server is alive
# -p${MYSQL_PASSWORD} → Pass the password for authentication
        options: >-
          --health-cmd="mysqladmin ping -p$MYSQL_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      # Installs Node.js so frontend assets can be built.
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

          # Enables automatic caching of npm dependencies.
          cache: npm

          # Uses package-lock.json to determine cache validity.
          cache-dependency-path: package-lock.json

      - name: Get Composer cache directory
        id: composer-cache
# prints the path of Composer’s cache directory. actions/cache will this way know where to cache the
# the Composer dependencies. This info will be now in the steps.composer-cache.outputs.dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
# Find the cached packages here, in this path
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}


# We must create a .env. However, the real .env is not committed to the repository.
# It is unavailable. So, we copy the .env.example to .env. The trick is the the workflow
# environment will override the values in .env, so we can set the database connection details
# in the workflow env and they will be used when running the tests.
      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

# Tell here the workflow to wait 5 s for the MySQL service to be fully ready before running the
# migrations and tests. This is a small buffer to ensure that the MySQL service is up and running
# before we try to connect to it.
      - name: Small DB readiness buffer
        run: sleep 5

# No need for seeding here, because we do not need seeding for the testing.
      - name: Run migrations
        run: php artisan migrate --force

      # This is the final step of the test job, it runs the tests.
      - name: Run tests
        run: php artisan test

# We want to continuously deploy on every git pus, if all tests are ok.
  deploy:
    runs-on: ubuntu-latest
    needs: test

    # This is the path where our app is in the EC2 instance. var/www/sail2
    env:
      EC2_APP_PATH: ${{ secrets.EC2_APP_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

# Builds frontend assets locally in Github Actions instead of on EC2 (faster & consistent).
# tar -czf build-assets.tar.gz public/build --- compresses built assets into a tar.gz archive for transfer.

      - name: Build production assets
        run: |
          npm ci
          npm run build
          tar -czf build-assets.tar.gz public/build

      - name: Upload built assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22

          # Local file to upload. We just compressed the built assets into build-assets.tar.gz
          source: build-assets.tar.gz

          # Destination directory on EC2.
          target: /tmp

          # Overwrites existing file if present.
          overwrite: true

      - name: Deploy to AWS EC2

        # Opens an SSH session and executes deployment commands on the server.
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22

          # set -e → Exit immediately if any command fails, ensuring we catch errors early.
          # cd ${{ env.EC2_APP_PATH }} → Navigate to the application directory on the server.
          # git fetch origin main → Fetch the latest changes from the main branch.
          # git reset --hard origin/main → Reset the local code to match the latest main branch
          # mkdir -p /tmp/sail2-build → Create a temporary directory for the built assets.
          # tar -xzf /tmp/build-assets.tar.gz -C /tmp/sail2-build → Extract the uploaded assets into the temporary directory.
          # rm -rf public/build → Remove the old build directory on the server.
          # mv /tmp/sail2-build/public/build public/build → Move the new build directory into the old ones place.
          # rm -rf /tmp/sail2-build /tmp/build-assets.tar.gz → Clean up from temporary files.
          # php artisan queue:restart || true → Restart the queue workers to ensure they use the latest code, but ignore errors if no workers are running.
          script: |
            set -e
            cd ${{ env.EC2_APP_PATH }}
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            mkdir -p /tmp/sail2-build
            tar -xzf /tmp/build-assets.tar.gz -C /tmp/sail2-build
            rm -rf public/build
            mv /tmp/sail2-build/public/build public/build
            rm -rf /tmp/sail2-build /tmp/build-assets.tar.gz
            php artisan queue:restart || true
